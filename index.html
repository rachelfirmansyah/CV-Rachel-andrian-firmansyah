<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Curriculum Vitae</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    background:url("images/background.jpg") no-repeat center center/cover;
    height:100vh;
    overflow:hidden;
}

.overlay{

    width:100%;
    height:100vh;
    background:rgba(0,0,0,.60);

}

nav{

    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 80px;
}

.logo{

    color:white;
    font-size:32px;
    font-weight:800;
}

.logo span{

    color:#C89B6D;

}

nav ul{

    display:flex;
    list-style:none;
    gap:40px;

}

nav ul li a{

    color:white;
    text-decoration:none;
    font-size:18px;
    transition:.3s;

}

nav ul li a:hover{

    color:#C89B6D;

}

.hero{

    width:100%;
    height:80vh;
    display:flex;
    align-items:center;
    padding-left:90px;

}

.content{

    max-width:650px;

}

.content h1{

    color:white;
    font-size:70px;
    line-height:85px;
    font-weight:800;

}

.content h1 span{

    color:#C89B6D;

}

.content p{

    margin-top:20px;
    color:#ddd;
    font-size:22px;
    line-height:35px;

}

button{

    margin-top:40px;
    padding:18px 45px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#C89B6D;
    color:white;
    cursor:pointer;
    transition:.4s;

}

button:hover{

    transform:translateY(-5px);
    background:#a87445;
    box-shadow:0 10px 25px rgba(0,0,0,.4);

}

.fade-out{

    animation:fade .8s forwards;

}

@keyframes fade{

from{

opacity:1;

}

to{

opacity:0;

}

}

@media(max-width:900px){

.hero{

padding:40px;

}

.content h1{

font-size:48px;
line-height:60px;

}

nav{

padding:20px 40px;

}

nav ul{

display:none;

}

}

    </style>

</head>
<body>

<div class="overlay">

<nav>

<div class="logo">
My<span>CV</span>
</div>

<ul>

<li><a href="#">Home</a></li>
<li><a href="#">Tentang</a></li>
<li><a href="#">Portfolio</a></li>
<li><a href="#">Kontak</a></li>

</ul>

</nav>

<div class="hero">

<div class="content">

<h1>
Selamat Datang di <br>
<span>Curriculum Vitae</span>
</h1>

<p>

Halo, saya Rachel Firmansyah.
Terima kasih telah mengunjungi website CV saya.
Klik tombol di bawah untuk melihat profil lengkap,
pendidikan, pengalaman, keahlian, serta proyek yang pernah saya kerjakan.

</p>

<button onclick="masukCV()">

Masuk ke CV

</button>

</div>

</div>

</div>

<script>

function masukCV(){

document.querySelector(".overlay").classList.add("fade-out");

setTimeout(function(){

window.location.href="cv.html";

},700);

}

</script>

</body>
</html>
